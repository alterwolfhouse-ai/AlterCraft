services:
  - type: web
    name: altercraft-payu-gateway
    runtime: node
    rootDir: services/payu-gateway
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: PAYU_ENV
        value: production
      - key: PAYU_KEY
        sync: false
      - key: PAYU_SALT
        sync: false
      - key: SITE_BASE_URL
        value: https://www.altercraft.in
      - key: PUBLIC_BASE_URL
        value: https://altercraft-payu-gateway.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://www.altercraft.in,https://altercraft.in
      - key: ORDER_NOTIFY_ENDPOINT
        value: https://formsubmit.co/ajax/support@altercraft.in
