<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Contractor cash ledger visual</title>
  <desc id="desc">Cash bucket and ledger system for contractor jobs, material, labour, profit and reserve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5e6"/>
      <stop offset=".48" stop-color="#c7985a"/>
      <stop offset="1" stop-color="#17110d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#26140b" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity=".2" stroke="#4b3321">
    <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200"/>
    <path d="M120 0V675M240 0V675M360 0V675M480 0V675M600 0V675M720 0V675M840 0V675M960 0V675M1080 0V675"/>
  </g>
  <g transform="translate(90 120)">
    <text x="0" y="0" fill="#87551f" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="5">CASH LEDGER</text>
    <text x="0" y="82" fill="#24150e" font-family="Georgia, serif" font-size="72" font-weight="700">Every rupee</text>
    <text x="0" y="154" fill="#24150e" font-family="Georgia, serif" font-size="72" font-style="italic">needs a bucket.</text>
    <text x="0" y="220" fill="#5a402d" font-family="Arial, sans-serif" font-size="22">Separate job money, material, labour, reserve, debt, tools and profit before spending.</text>
  </g>
  <g transform="translate(668 104)" filter="url(#shadow)">
    <rect width="372" height="460" rx="32" fill="#17110d" stroke="#f1d6a2" stroke-opacity=".42"/>
    <g transform="translate(38 46)">
      <rect width="296" height="72" rx="18" fill="#251b14" stroke="#e3b766" stroke-opacity=".34"/>
      <rect y="96" width="136" height="118" rx="20" fill="#1c261d" stroke="#8ecb83" stroke-opacity=".35"/>
      <rect x="160" y="96" width="136" height="118" rx="20" fill="#2c2017" stroke="#e3b766" stroke-opacity=".35"/>
      <rect y="238" width="136" height="118" rx="20" fill="#2b1716" stroke="#d67668" stroke-opacity=".35"/>
      <rect x="160" y="238" width="136" height="118" rx="20" fill="#1c1b1a" stroke="#f1d6a2" stroke-opacity=".18"/>
      <g fill="#fff8ec" font-family="Arial, sans-serif" font-weight="700">
        <text x="22" y="44" font-size="21">Job Cash</text>
        <text x="22" y="154" font-size="19">Material</text>
        <text x="182" y="154" font-size="19">Labour</text>
        <text x="22" y="296" font-size="19">Debt</text>
        <text x="182" y="296" font-size="19">Profit</text>
      </g>
    </g>
  </g>
</svg>
