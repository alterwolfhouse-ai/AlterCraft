<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Labour material site control visual</title>
  <desc id="desc">Daily site report, material movement and labour deployment dashboard visual.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#716456"/>
      <stop offset=".48" stop-color="#3c332c"/>
      <stop offset="1" stop-color="#11100f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4df" stop-opacity=".2"/>
      <stop offset="1" stop-color="#fff4df" stop-opacity=".06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity=".18" stroke="#ead1a5">
    <path d="M0 486c190-60 384-78 590-32 201 45 395 28 610-53" fill="none" stroke-width="2"/>
    <path d="M0 520c205-62 403-82 610-34 221 51 388 21 590-56" fill="none"/>
  </g>
  <g transform="translate(86 96)">
    <text x="0" y="0" fill="#d9a34c" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="5">LABOUR + MATERIAL + SITE REPORT</text>
    <text x="0" y="80" fill="#fff8ec" font-family="Georgia, serif" font-size="70" font-weight="700">One daily desk</text>
    <text x="0" y="148" fill="#fff8ec" font-family="Georgia, serif" font-size="70" font-style="italic">for moving work.</text>
    <text x="0" y="214" fill="#efe0c9" font-family="Arial, sans-serif" font-size="22">Attendance, procurement, progress photos and next actions in a single rhythm.</text>
  </g>
  <g transform="translate(110 390)">
    <rect width="220" height="114" rx="22" fill="url(#panel)" stroke="#ead1a5" stroke-opacity=".35"/>
    <rect x="248" width="220" height="114" rx="22" fill="url(#panel)" stroke="#ead1a5" stroke-opacity=".35"/>
    <rect x="496" width="220" height="114" rx="22" fill="url(#panel)" stroke="#ead1a5" stroke-opacity=".35"/>
    <g fill="#fff8ec" font-family="Arial, sans-serif" font-weight="700">
      <text x="28" y="54" font-size="21">Labour</text>
      <text x="276" y="54" font-size="21">Material</text>
      <text x="524" y="54" font-size="21">Site Proof</text>
    </g>
    <g fill="#d9a34c">
      <circle cx="32" cy="82" r="5"/><circle cx="280" cy="82" r="5"/><circle cx="528" cy="82" r="5"/>
    </g>
  </g>
  <g transform="translate(765 86)" filter="url(#shadow)">
    <rect width="300" height="510" rx="44" fill="#090807" stroke="#ead1a5" stroke-opacity=".38"/>
    <rect x="24" y="28" width="252" height="454" rx="30" fill="#17130f"/>
    <rect x="48" y="72" width="204" height="72" rx="16" fill="#221d18" stroke="#ead1a5" stroke-opacity=".2"/>
    <rect x="48" y="164" width="95" height="112" rx="16" fill="#171f1a" stroke="#8ec782" stroke-opacity=".32"/>
    <rect x="157" y="164" width="95" height="112" rx="16" fill="#221d18" stroke="#d9a34c" stroke-opacity=".28"/>
    <rect x="48" y="296" width="204" height="52" rx="14" fill="#221d18" stroke="#ead1a5" stroke-opacity=".16"/>
    <rect x="48" y="364" width="204" height="52" rx="14" fill="#221d18" stroke="#ead1a5" stroke-opacity=".16"/>
    <g fill="#fff8ec" font-family="Arial, sans-serif" font-weight="700">
      <text x="70" y="116" font-size="20">Daily Report</text>
      <text x="68" y="226" font-size="18">2 + 1</text>
      <text x="176" y="226" font-size="18">12</text>
      <text x="68" y="328" font-size="17">Photos</text>
      <text x="68" y="396" font-size="17">Next Action</text>
    </g>
  </g>
</svg>
