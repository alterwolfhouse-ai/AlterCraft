<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Send Furniture Project Brief | AlterCraft</title>
  <meta name="description" content="Send AlterCraft your furniture, wardrobe, kitchen, CNC panel, mandir or rental furniture project brief directly on WhatsApp." />
  <link rel="canonical" href="https://www.altercraft.in/lead/" />
  <style>
    body{margin:0;background:#0a0a0a;color:#f7f7f7;font-family:Arial,sans-serif;line-height:1.6}
    main{max-width:780px;margin:auto;padding:52px 22px}
    a{color:#ffb800} h1{font-size:clamp(38px,7vw,72px);line-height:1;margin:0 0 16px;color:#ffb800}
    form{display:grid;gap:14px;margin-top:28px;background:#111;border:1px solid #ffb80044;padding:24px}
    label{display:grid;gap:6px;font-weight:700} input,select,textarea{font:inherit;padding:13px;background:#050505;color:white;border:1px solid #333}
    textarea{min-height:130px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btn{background:#ffb800;color:#000;border:0;padding:15px 20px;font-weight:900;text-transform:uppercase;cursor:pointer}
    @media(max-width:680px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <a href="/">/ back to AlterCraft</a>
  <h1>Send your project brief</h1>
  <p>Share the room type, size, location and requirement. This form opens WhatsApp with a ready message to AlterCraft, so your lead reaches us immediately.</p>
  <form id="leadForm">
    <div class="row">
      <label>Name<input name="name" required placeholder="Your name"></label>
      <label>Phone<input name="phone" required placeholder="Your phone number"></label>
    </div>
    <div class="row">
      <label>Location<input name="location" placeholder="Ghaziabad / Noida / Delhi NCR"></label>
      <label>Requirement<select name="service"><option>Modular wardrobe</option><option>Custom furniture</option><option>Modular kitchen</option><option>CNC wall panel</option><option>Pooja mandir</option><option>Furniture on rent</option><option>Commercial interior</option></select></label>
    </div>
    <label>Budget range<select name="budget"><option>Need guidance</option><option>Under Rs 25,000</option><option>Rs 25,000 - 75,000</option><option>Rs 75,000 - 2,00,000</option><option>Rs 2,00,000+</option></select></label>
    <label>Project details<textarea name="details" required placeholder="Room size, wall size, reference idea, timeline, material preference..."></textarea></label>
    <button class="btn" type="submit">Send on WhatsApp</button>
  </form>
</main>
<script>
document.getElementById('leadForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.currentTarget).entries());
  const text = `AlterCraft lead%0AName: ${data.name}%0APhone: ${data.phone}%0ALocation: ${data.location}%0ARequirement: ${data.service}%0ABudget: ${data.budget}%0ADetails: ${data.details}`;
  window.location.href = `https://wa.me/918826436093?text=${encodeURIComponent(text).replaceAll('%250A','%0A')}`;
});
</script>
</body>
</html>
