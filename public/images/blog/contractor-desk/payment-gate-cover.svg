<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Contractor payment gate visual</title>
  <desc id="desc">Payment gate workflow for contractors with advance, material, labour and milestone controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8efe2"/>
      <stop offset=".54" stop-color="#d4b184"/>
      <stop offset="1" stop-color="#4a3324"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b211b"/>
      <stop offset="1" stop-color="#0f0c0a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#321b0d" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="110" r="260" fill="#fff6e8" opacity=".25"/>
  <circle cx="180" cy="600" r="290" fill="#6d482b" opacity=".18"/>
  <g transform="translate(690 88)" filter="url(#shadow)">
    <rect width="340" height="498" rx="32" fill="url(#dark)" stroke="#efd8aa" stroke-opacity=".42"/>
    <rect x="35" y="50" width="270" height="82" rx="18" fill="#1f1915" stroke="#dfb76d" stroke-opacity=".35"/>
    <rect x="35" y="154" width="270" height="82" rx="18" fill="#161d18" stroke="#92c783" stroke-opacity=".35"/>
    <rect x="35" y="258" width="270" height="82" rx="18" fill="#241816" stroke="#cf6e63" stroke-opacity=".35"/>
    <rect x="35" y="362" width="270" height="82" rx="18" fill="#1f1915" stroke="#dfb76d" stroke-opacity=".35"/>
    <g font-family="Arial, sans-serif" font-weight="700">
      <text x="62" y="100" fill="#fff7e8" font-size="22">Advance Gate</text>
      <text x="62" y="204" fill="#fff7e8" font-size="22">Material Gate</text>
      <text x="62" y="308" fill="#fff7e8" font-size="22">Labour Gate</text>
      <text x="62" y="412" fill="#fff7e8" font-size="22">Milestone Gate</text>
    </g>
    <path d="M304 91h44m0 0-14-14m14 14-14 14M304 195h44m0 0-14-14m14 14-14 14M304 299h44m0 0-14-14m14 14-14 14" fill="none" stroke="#dfb76d" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(96 122)">
    <text x="0" y="0" fill="#8a5522" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="5">PAYMENT GATES</text>
    <text x="0" y="80" fill="#24150e" font-family="Georgia, serif" font-size="70" font-weight="700">Stop risky work</text>
    <text x="0" y="148" fill="#24150e" font-family="Georgia, serif" font-size="70" font-style="italic">before it starts.</text>
    <text x="0" y="212" fill="#5c4230" font-family="Arial, sans-serif" font-size="22">Advance, material, labour and milestone checks for contractor execution.</text>
    <g transform="translate(0 276)" fill="none" stroke="#7e542e" stroke-width="2">
      <rect width="132" height="76" rx="18"/>
      <rect x="154" width="132" height="76" rx="18"/>
      <rect x="308" width="132" height="76" rx="18"/>
    </g>
    <g fill="#4a3324" font-family="Arial, sans-serif" font-size="17" font-weight="700">
      <text x="32" y="323">Cash</text>
      <text x="188" y="323">Proof</text>
      <text x="338" y="323">Owner</text>
    </g>
  </g>
</svg>
